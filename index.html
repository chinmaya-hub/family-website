<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, pink, lightblue);
        }

        /* Navbar */
        nav {
            text-align: center;
            padding: 15px;
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        /* Card */
        .card {
            width: 320px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        /* Profile Image */
        .card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Name */
        h1 {
            margin: 15px 0 5px;
        }

        /* Subtitle */
        p {
            color: gray;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            margin: 10px 5px;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .about { background: #4CAF50; }
        .contact { background: #2196F3; }
        .gallery { background: #ff9800; }

        .btn:hover {
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <!-- Profile Card -->
    <div class="card">

        <!-- Image -->
        <img src="photo1.webp">

        <!-- Name -->
        <h1>Chinmaya</h1>

        <!-- Info -->
        <p>B.Tech CSE Student 💻</p>

        <!-- Buttons -->
        <a href="about.html" class="btn about">About Me</a>
        <a href="contact.html" class="btn contact">Contact</a>
        <a href="gallery.html" class="btn gallery">Gallery</a>

    </div>

</body>
</html>
