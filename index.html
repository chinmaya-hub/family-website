<!DOCTYPE html>
<html>
<head>
<title>Chinmaya | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Background Animation */
body{
height:100vh;
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:gradient 12s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Navbar */
.navbar{
display:flex;
justify-content:center;
gap:30px;
padding:18px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
position:sticky;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
position:relative;
}

.navbar a::after{
content:"";
position:absolute;
width:0%;
height:2px;
background:white;
left:0;
bottom:-5px;
transition:0.3s;
}

.navbar a:hover::after{
width:100%;
}

/* Card */
.card{
width:420px;
margin:80px auto;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.2);
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* Profile Image */
.profile-img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
transition:0.4s;
cursor:pointer; /* IMPORTANT */
}

.profile-img:hover{
transform:scale(1.08);
box-shadow:0 0 20px white;
}

/* FULL SCREEN POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
width:90%;
max-width:500px;
max-height:90%;
border-radius:10px;
}

/* Text */
h1{
margin-top:15px;
font-size:32px;
}

.bio{
font-size:14px;
line-height:1.8;
margin-top:15px;
opacity:0.9;
}

/* Buttons */
.btn{
display:inline-block;
margin:8px;
padding:10px 18px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:14px;
transition:0.3s;
}

.about{background:#00c853;}
.contact{background:#2979ff;}
.gallery{background:#ff6d00;}
.skills{background:#9c27b0;}
.projects{background:#ff1744;}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Responsive */
@media(max-width:500px){
.card{width:90%;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="gallery.html">Gallery</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
</div>

<!-- CARD -->
<div class="card">

<img src="photo2.png" class="profile-img" onclick="openImg(this.src)">

<h1>Chinmaya</h1>
<p>B.Tech CSE Student 💻</p>

<div class="bio">
I love gaming 🎮, music 🎧, editing 🎬 and creativity.<br><br>
I started with cricket 🏏 but after lockdown moved to esports.<br><br>
I enjoy photography 📸, traveling ✈️, nature 🌿 and animals 🐾.
</div>

<br>

<a href="about.html" class="btn about">About</a>
<a href="contact.html" class="btn contact">Contact</a>
<a href="gallery.html" class="btn gallery">Gallery</a>
<br>
<a href="skills.html" class="btn skills">Skills</a>
<a href="projects.html" class="btn projects">Projects</a>

</div>

<!-- POPUP -->
<div id="popup" onclick="closeImg()">
  <img id="popupImg">
</div>

<script>
function openImg(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=src;
}

function closeImg(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
