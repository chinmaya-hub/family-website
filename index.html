<!DOCTYPE html>
<html>
<head>
    <title>Chinmaya | Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #a18cd1, #89f7fe, #66a6ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navbar */
        nav {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            color: black;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4081;
        }

        /* Card */
        .card {
            width: 320px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Image */
        .card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            transition: 0.4s;
        }

        .card img:hover {
            transform: scale(1.1);
        }

        h1 {
            margin: 15px 0 5px;
        }

        p {
            color: gray;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            margin: 10px 5px;
            padding: 12px 22px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .about { background: linear-gradient(45deg, #4CAF50, #2ecc71); }
        .contact { background: linear-gradient(45deg, #2196F3, #00c6ff); }
        .gallery { background: linear-gradient(45deg, #ff9800, #ff5722); }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <!-- Profile Card -->
    <div class="card">

        <!-- Image -->
        <img src="photo1.webp">

        <!-- Name -->
        <h1>Chinmaya</h1>

        <!-- Info -->
        <p>B.Tech CSE Student 💻</p>

        <!-- Buttons -->
        <a href="about.html" class="btn about">About Me</a>
        <a href="contact.html" class="btn contact">Contact</a>
        <a href="gallery.html" class="btn gallery">Gallery</a>

    </div>

</body>
</html>
