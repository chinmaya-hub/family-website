<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills | Chinmaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 50px;
background:#020617;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
}

.navbar a:hover{
color:#38bdf8;
}

/* Container */
.container{
max-width:800px;
margin:60px auto;
padding:20px;
}

/* Heading */
h1{
text-align:center;
margin-bottom:30px;
}

/* Skill Box */
.skill{
margin:20px 0;
}

.skill-name{
margin-bottom:5px;
font-size:14px;
}

/* Bar */
.bar{
height:10px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#38bdf8;
border-radius:10px;
animation:load 2s ease;
}

/* Levels */
.java{width:70%;}
.c{width:65%;}
.dsa{width:60%;}
.html{width:80%;}
.css{width:75%;}

/* Animation */
@keyframes load{
from{width:0;}
}

/* Footer */
.footer{
text-align:center;
padding:20px;
color:#94a3b8;
font-size:13px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div>Chinmaya</div>
<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="container">

<h1>My Skills 🚀</h1>

<div class="skill">
<div class="skill-name">Java</div>
<div class="bar"><div class="fill java"></div></div>
</div>

<div class="skill">
<div class="skill-name">C Programming</div>
<div class="bar"><div class="fill c"></div></div>
</div>

<div class="skill">
<div class="skill-name">Data Structures & Algorithms</div>
<div class="bar"><div class="fill dsa"></div></div>
</div>

<div class="skill">
<div class="skill-name">HTML</div>
<div class="bar"><div class="fill html"></div></div>
</div>

<div class="skill">
<div class="skill-name">CSS</div>
<div class="bar"><div class="fill css"></div></div>
</div>

</div>

<div class="footer">
Always Improving 🚀
</div>

</body>
</html>
