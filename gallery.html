<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, pink, lightblue);
}

/* Navbar */
nav {
    text-align: center;
    padding: 15px;
    background: white;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    color: black;
}

/* Title */
h1 {
    text-align: center;
}

/* Gallery Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Images */
.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.3s;
}

/* Hover Effect */
.gallery img:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
</nav>

<h1>My Photo Gallery 📸</h1>

<div class="gallery">
    <img src="photo1.webp">
    <img src="photo2.png">
    <img src="photo3.png">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <img src="photo6.png">
</div>

</body>
</html>
