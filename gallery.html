<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, pink, lightblue);
}

/* Navbar */
nav {
    text-align: center;
    padding: 15px;
    background: white;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    color: black;
}

/* Title */
h1 {
    text-align: center;
}

/* Gallery Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Images */
.gallery img {
    width: 100%;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

/* Lightbox Image */
.lightbox img {
    margin: auto;
    display: block;
    max-width: 80%;
    max-height: 80%;
}

/* Close Button */
.close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}
</style>

</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
</nav>

<h1>My Photo Gallery 📸</h1>

<div class="gallery">
    <img src="photo1.webp" onclick="openImg(this)">
    <img src="photo2.png" onclick="openImg(this)">
    <img src="photo3.png" onclick="openImg(this)">
    <img src="photo4.jpg" onclick="openImg(this)">
    <img src="photo5.jpg" onclick="openImg(this)">
    <img src="photo6.png" onclick="openImg(this)">
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeImg()">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openImg(img) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = img.src;
}

function closeImg() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
