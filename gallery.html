<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:center;
gap:25px;
padding:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
}

/* FILTER BUTTONS */
.filters{
text-align:center;
margin-top:20px;
}

.filters button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#00ffcc;
cursor:pointer;
font-weight:bold;
}

.filters button:hover{
background:white;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.item{
text-align:center;
color:white;
}

.item img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.item img:hover{
transform:scale(1.05);
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
width:90%;
max-height:90%;
}

/* MOBILE */
@media(max-width:600px){
.item img{height:200px;}
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="gallery.html">Gallery</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
</div>

<!-- FILTERS -->
<div class="filters">
<button onclick="filter('all')">All</button>
<button onclick="filter('school')">School</button>
<button onclick="filter('esports')">Esports</button>
<button onclick="filter('personal')">Personal</button>
</div>

<!-- GALLERY -->
<div class="gallery">

<div class="item school">
<img src="school photo.png" onclick="openImg(this.src)">
<p>My School 🏫</p>
</div>

<div class="item esports">
<img src="esports photo.jpg" onclick="openImg(this.src)">
<p>Esports Journey 🎮</p>
</div>

<div class="item personal">
<img src="photo1.webp" onclick="openImg(this.src)">
<p>Photo 1</p>
</div>

<div class="item personal">
<img src="photo2.png" onclick="openImg(this.src)">
<p>Photo 2</p>
</div>

<div class="item personal">
<img src="photo3.png" onclick="openImg(this.src)">
<p>Photo 3</p>
</div>

<div class="item personal">
<img src="photo4.jpg" onclick="openImg(this.src)">
<p>Photo 4</p>
</div>

<div class="item personal">
<img src="photo5.jpg" onclick="openImg(this.src)">
<p>Photo 5</p>
</div>

<div class="item personal">
<img src="photo6.png" onclick="openImg(this.src)">
<p>Photo 6</p>
</div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closeImg()">
<img id="popupImg">
</div>

<script>
function openImg(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}

function closeImg(){
document.getElementById("popup").style.display="none";
}

/* FILTER FUNCTION */
function filter(category){
let items=document.querySelectorAll(".item");

items.forEach(item=>{
if(category==="all"){
item.style.display="block";
}
else if(item.classList.contains(category)){
item.style.display="block";
}
else{
item.style.display="none";
}
});
}
</script>

</body>
</html>
