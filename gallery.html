<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:center;
gap:25px;
padding:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
}

/* GALLERY GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

/* IMAGES */
.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* POPUP FULL SCREEN */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
width:90%;
max-height:90%;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
.gallery img{
height:200px;
}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="gallery.html">Gallery</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
</div>

<!-- GALLERY -->
<div class="gallery">

<img src="school photo.png" onclick="openImg(this.src)"> <!-- SCHOOL PHOTO -->

<img src="esports photo.jpg" onclick="openImg(this.src)"> <!-- ✅ ADDED -->

<img src="photo1.webp" onclick="openImg(this.src)">
<img src="photo2.png" onclick="openImg(this.src)">
<img src="photo3.png" onclick="openImg(this.src)">
<img src="photo4.jpg" onclick="openImg(this.src)">
<img src="photo5.jpg" onclick="openImg(this.src)">
<img src="photo6.png" onclick="openImg(this.src)">

</div>

<!-- POPUP -->
<div id="popup" onclick="closeImg()">
  <img id="popupImg">
</div>

<script>
function openImg(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=src;
}

function closeImg(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
