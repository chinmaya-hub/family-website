<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator | Chinmaya</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#020617;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

.navbar a:hover{
color:#38bdf8;
}

/* Back Button */
.back{
margin:20px 40px;
display:inline-block;
color:#38bdf8;
text-decoration:none;
}

.back:hover{
text-decoration:underline;
}

/* Calculator Box */
.container{
display:flex;
justify-content:center;
align-items:center;
height:75vh;
}

.calculator{
background:#020617;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
width:260px;
text-align:center;
}

.display{
width:100%;
height:50px;
background:#1e293b;
border:none;
border-radius:8px;
margin-bottom:15px;
text-align:right;
font-size:20px;
color:white;
padding:10px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#38bdf8;
color:black;
}

.equal{
grid-column:span 2;
background:#38bdf8;
color:black;
}

.clear{
background:#ef4444;
}
</style>
</head>

<body>

<div class="navbar">
<div>Chinmaya</div>
<div>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
</div>
</div>

<a href="projects.html" class="back">← Back to Projects</a>

<div class="container">
<div class="calculator">

<h2>Calculator 🧮</h2>

<input type="text" id="display" class="display" readonly>

<div class="buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="backspace()">⌫</button>
<button onclick="press('+')">+</button>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="equal" onclick="calculate()">=</button>
</div>

</div>
</div>

<script>
let display = document.getElementById("display");

function press(val){
display.value += val;
}

function clearDisplay(){
display.value = "";
}

function backspace(){
display.value = display.value.slice(0,-1);
}

function calculate(){
try{
display.value = eval(display.value);
}catch{
display.value = "Error";
}
}
</script>

</body>
</html>
