<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator | Chinmaya</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* Calculator Box */
.calculator{
background:#020617;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
width:300px;
}

/* Title */
.title{
text-align:center;
margin-bottom:15px;
font-size:20px;
}

/* Display */
#display{
width:100%;
height:50px;
border:none;
outline:none;
border-radius:10px;
padding:10px;
font-size:20px;
text-align:right;
background:#0f172a;
color:white;
margin-bottom:15px;
}

/* Buttons Grid */
.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

/* Button Style */
button{
padding:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#38bdf8;
color:black;
}

/* Special Buttons */
.equal{
grid-column:span 2;
background:#38bdf8;
color:black;
}

.equal:hover{
background:#0ea5e9;
}

.clear{
background:#ef4444;
}

.clear:hover{
background:#dc2626;
}

/* History */
.history{
margin-top:10px;
font-size:12px;
color:#94a3b8;
min-height:15px;
}
</style>
</head>

<body>

<div class="calculator">

<div class="title">Calculator 🧮</div>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('/')">/</button>
<button onclick="append('*')">*</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">-</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('.')">.</button>

<button onclick="append('0')">0</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="history" id="history"></div>

</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");
let justCalculated = false;

// Add number/operator
function append(value){
if(justCalculated){
display.value="";
justCalculated=false;
}
display.value += value;
}

// Clear all
function clearDisplay(){
display.value="";
history.innerText="";
}

// Delete last
function deleteLast(){
display.value = display.value.slice(0,-1);
}

// Calculate
function calculate(){
try{
let result = eval(display.value);
history.innerText = display.value + " = " + result;
display.value = result;
justCalculated = true;
}catch{
display.value = "Error";
}
}

// Keyboard Support
document.addEventListener("keydown",function(e){

if((e.key >= 0 && e.key <= 9) || "+-*/.".includes(e.key)){
append(e.key);
}

else if(e.key === "Enter"){
calculate();
}

else if(e.key === "Backspace"){
deleteLast();
}

else if(e.key === "Escape"){
clearDisplay();
}

});
</script>

</body>
</html>
