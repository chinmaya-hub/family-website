<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List | Chinmaya</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#020617;
}

.logo{
font-weight:600;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
transition:0.3s;
}

.navbar a:hover{
color:#38bdf8;
}

/* BACK BUTTON */
.back{
padding:15px 40px;
}

.back a{
color:#38bdf8;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

.back a:hover{
text-decoration:underline;
}

/* MAIN */
.main{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.container{
background:#020617;
padding:25px;
border-radius:15px;
width:340px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
animation:fadeIn 0.5s ease;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
text-align:center;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:10px;
border:none;
outline:none;
border-radius:8px;
margin-bottom:10px;
transition:0.3s;
}

input:focus{
box-shadow:0 0 8px #38bdf8;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
background:#38bdf8;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
}

/* LIST */
ul{
list-style:none;
margin-top:15px;
}

li{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

li:hover{
background:#334155;
}

/* DELETE */
.delete{
color:red;
cursor:pointer;
font-weight:bold;
}

/* COMPLETE */
.completed{
text-decoration:line-through;
opacity:0.6;
cursor:pointer;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">Chinmaya</div>
<div>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
</div>
</div>

<!-- BACK BUTTON -->
<div class="back">
<a href="projects.html">⬅ Back to Projects</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<h2>My To-Do List 📋</h2>

<input type="text" id="taskInput" placeholder="Enter a task...">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>
</div>

<script>

// Load tasks
window.onload = function(){
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
tasks.forEach(task => createTask(task.text, task.completed));
};

// Add task
function addTask(){
let input = document.getElementById("taskInput");
let task = input.value.trim();

if(task === ""){
alert("Please enter a task!");
return;
}

createTask(task, false);
saveTasks();

input.value = "";
}

// Enter key support
document.getElementById("taskInput").addEventListener("keypress", function(e){
if(e.key === "Enter"){
addTask();
}
});

// Create task UI
function createTask(text, completed){
let li = document.createElement("li");

li.innerHTML = `
<span onclick="toggleTask(this)">${text}</span>
<span class="delete" onclick="deleteTask(this)">X</span>
`;

if(completed){
li.querySelector("span").classList.add("completed");
}

document.getElementById("taskList").appendChild(li);
}

// Delete task
function deleteTask(element){
element.parentElement.remove();
saveTasks();
}

// Toggle complete
function toggleTask(element){
element.classList.toggle("completed");
saveTasks();
}

// Save tasks
function saveTasks(){
let tasks = [];
document.querySelectorAll("#taskList li").forEach(li => {
tasks.push({
text: li.querySelector("span").innerText,
completed: li.querySelector("span").classList.contains("completed")
});
});
localStorage.setItem("tasks", JSON.stringify(tasks));
}

</script>

</body>
</html>
